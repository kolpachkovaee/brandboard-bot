version: "1"
projects:
- name: My project
  environments:
  - name: Production
    services:
    - type: web
      name: brandboard-bot
      runtime: python
      repo: https://github.com/kolpachkovaee/brandboard-bot
      plan: free
      envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: TELEGRAM_TOKEN
        sync: false
      region: oregon
      buildCommand: pip install --upgrade pip && pip install "aiogram==2.25.2" "google-generativeai==0.7.2" "python-dotenv==1.0.0"
      startCommand: python bot.py
      autoDeployTrigger: commit
      pythonVersion: "3.11.8"
